{% extends "admin-panel/base/base.html" %}

{% block main %}
  <main class="page-content">

    <div class="page-header">
      <div class="page-header-info">
        <h1>افزودن گزینه جدید برای سوال</h1>
        <p>سوال {{item.name}}</p>
      </div>
      <div class="page-header-actions">
        <a href="{% url 'admin-panel:quiz-questions-update' quiz_id=quiz.id pk=item.pk %}" class="btn btn-outline-secondary btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          بازگشت
        </a>
      </div>
    </div>

    <form action="" method="POST">
      {% csrf_token %}
      <div class="row g-4">
        <div class="col-lg-8">

          <div class="card mb-4">
            <div class="card-header">
              <h6 class="card-title">گزینه</h6>
              
            </div>
            <div class="card-body">
              <p class="card-title m-2">تعداد گزینه سوال {{item.options.count}}</p>
              <div class="mb-0">
                <label class="form-label">{{ form.text.label }}<span class="text-danger">*</span></label>
                {{ form.text }}
              </div>
              <div class="mb-3">
                <label class="form-label">{{ form.order.label }} <span class="text-danger">*</span></label>
                {{ form.order }}
              </div>
              <div class="mb-3">
                <label class="form-label">{{ form.is_correct.label }} : <span class="text-danger">{{ form.is_correct }}</span></label>
                
              </div>
 
              <div class="d-grid gap-2">
                <button  name="_save" class="btn btn-outline-secondary " >
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
                  ذخیره و برگشتن به سوال
                </button>
                <button class="btn btn-primary" name="_add">
                  ذخیره و افزودن گزینه بعدی
                </button>
               </div>
            </div>
          </div>

        </div>

 
      </div>
    </form>

  </main>
{% endblock main %}
