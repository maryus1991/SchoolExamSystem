<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تنظیمات سایت | پنل مدیریت</title>
 <link rel="stylesheet" href="https://tee.s3.ir-thr-at1.arvanstorage.ir/bootstrap5.css">
  <link rel="stylesheet" href="../../assets/css/main.css">
</head>
<body>
<div class="app-wrapper">
  <div id="sidebarContainer"></div>
  <div class="main-content">
    <div id="topbarContainer"></div>
    <main class="page-content">

      <div class="page-header">
        <div class="page-header-info">
          <h1>تنظیمات سایت</h1>
          <p>پیکربندی کلی پلتفرم آموزشی</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" onclick="saveSettings(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            ذخیره تغییرات
          </button>
        </div>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-4">
        <li class="nav-item"><a class="nav-link active" href="#" data-tab="general">اطلاعات عمومی</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="email">ایمیل</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="payment">پرداخت</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="security">امنیت</a></li>
        <li class="nav-item"><a class="nav-link" href="#" data-tab="seo">سئو</a></li>
      </ul>

      <div class="row g-3">
        <div class="col-xl-8">
          <!-- General Settings -->
          <div class="card mb-3">
            <div class="card-header">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-primary)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              <div class="card-title">اطلاعات سایت</div>
            </div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">نام سایت <span class="required">*</span></label>
                  <input type="text" class="form-control" value="آکادمی دانش">
                </div>
                <div class="col-md-6">
                  <label class="form-label">آدرس سایت <span class="required">*</span></label>
                  <input type="url" class="form-control" value="https://danesh.ir">
                </div>
                <div class="col-12">
                  <label class="form-label">توضیح سایت</label>
                  <textarea class="form-control" rows="3">بهترین پلتفرم آموزشی آنلاین ایران با تنوع دروس و معلمان مجرب</textarea>
                </div>
                <div class="col-md-6">
                  <label class="form-label">شماره تماس</label>
                  <input type="tel" class="form-control" value="۰۲۱-۱۲۳۴-۵۶۷۸">
                </div>
                <div class="col-md-6">
                  <label class="form-label">ایمیل پشتیبانی</label>
                  <input type="email" class="form-control" value="support@danesh.ir">
                </div>
                <div class="col-12">
                  <label class="form-label">آدرس</label>
                  <input type="text" class="form-control" value="تهران، خیابان ولیعصر، پلاک ۱۲۳">
                </div>
              </div>
            </div>
          </div>

          <!-- Logo & Favicon -->
          <div class="card mb-3">
            <div class="card-header">
              <div class="card-title">لوگو و آیکون</div>
            </div>
            <div class="card-body">
              <div class="row g-4">
                <div class="col-md-6">
                  <label class="form-label">لوگو اصلی</label>
                  <div style="background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:24px;text-align:center;margin-bottom:10px">
                    <div style="width:120px;height:40px;background:linear-gradient(135deg,var(--accent-primary),var(--accent-purple));border-radius:8px;margin:0 auto;display:flex;align-items:center;justify-content:center;color:white;font-size:.85rem;font-weight:700">آکادمی دانش</div>
                  </div>
                  <label class="btn btn-outline-secondary btn-sm w-100" style="cursor:pointer">
                    تغییر لوگو
                    <input type="file" class="d-none" accept="image/*">
                  </label>
                </div>
                <div class="col-md-6">
                  <label class="form-label">فاویکون</label>
                  <div style="background:var(--bg-tertiary);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:24px;text-align:center;margin-bottom:10px">
                    <div style="width:32px;height:32px;background:var(--accent-primary);border-radius:6px;margin:0 auto"></div>
                  </div>
                  <label class="btn btn-outline-secondary btn-sm w-100" style="cursor:pointer">
                    تغییر فاویکون
                    <input type="file" class="d-none" accept="image/x-icon,image/png">
                  </label>
                </div>
              </div>
            </div>
          </div>

          <!-- Social Media -->
          <div class="card">
            <div class="card-header"><div class="card-title">شبکه‌های اجتماعی</div></div>
            <div class="card-body">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">اینستاگرام</label>
                  <div class="input-group">
                    <span class="input-group-text">instagram.com/</span>
                    <input type="text" class="form-control" value="danesh_academy">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">تلگرام</label>
                  <div class="input-group">
                    <span class="input-group-text">t.me/</span>
                    <input type="text" class="form-control" value="danesh_channel">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">توییتر/X</label>
                  <div class="input-group">
                    <span class="input-group-text">x.com/</span>
                    <input type="text" class="form-control" placeholder="نام کاربری...">
                  </div>
                </div>
                <div class="col-md-6">
                  <label class="form-label">لینکدین</label>
                  <div class="input-group">
                    <span class="input-group-text">linkedin.com/in/</span>
                    <input type="text" class="form-control" placeholder="نام کاربری...">
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-xl-4">
          <!-- Status -->
          <div class="card mb-3">
            <div class="card-header"><div class="card-title">وضعیت سایت</div></div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label">حالت سایت</label>
                <select class="form-select">
                  <option>آنلاین (فعال)</option>
                  <option>حالت تعمیر</option>
                  <option>آفلاین (غیرفعال)</option>
                </select>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="maintenance" checked>
                <label class="form-check-label" for="maintenance">ثبت‌نام فعال است</label>
              </div>
              <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="captcha" checked>
                <label class="form-check-label" for="captcha">کپچا فعال است</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gdpr">
                <label class="form-check-label" for="gdpr">GDPR فعال است</label>
              </div>
            </div>
          </div>

          <!-- Currency -->
          <div class="card mb-3">
            <div class="card-header"><div class="card-title">واحد پول و زبان</div></div>
            <div class="card-body">
              <div class="mb-3">
                <label class="form-label">واحد پول</label>
                <select class="form-select">
                  <option>تومان (IRR)</option>
                  <option>دلار (USD)</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label">زبان پیش‌فرض</label>
                <select class="form-select">
                  <option>فارسی</option>
                  <option>انگلیسی</option>
                </select>
              </div>
              <div>
                <label class="form-label">منطقه زمانی</label>
                <select class="form-select">
                  <option>Asia/Tehran (UTC+3:30)</option>
                  <option>UTC</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Cache -->
          <div class="card">
            <div class="card-header"><div class="card-title">نگهداری سیستم</div></div>
            <div class="card-body d-flex flex-column gap-2">
              <button class="btn btn-outline-secondary btn-sm" onclick="showToast('کش پاک شد.','success')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
                پاک کردن کش
              </button>
              <button class="btn btn-outline-secondary btn-sm" onclick="showToast('پشتیبان‌گیری انجام شد.','success')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                پشتیبان‌گیری
              </button>
              <button class="btn btn-outline-danger btn-sm">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>
                بازنشانی تنظیمات
              </button>
            </div>
          </div>
        </div>
      </div>

    </main>
    <div id="footerContainer"></div>
  </div>
</div>
<script src="https://tee.s3.ir-thr-at1.arvanstorage.ir/bootstrap5.bundle.min.js"></script>
 <script src="../../assets/js/components.js"></script>
<script src="../../assets/js/main.js"></script>
<script>
  injectComponents('تنظیمات سایت', [
    { label: 'داشبورد', href: '../../index.html' },
    { label: 'تنظیمات سایت' }
  ]);

  function saveSettings(btn) {
    showLoading(btn);
    setTimeout(function() { hideLoading(btn); showToast('تنظیمات ذخیره شد!', 'success'); }, 1200);
  }
</script>
</body>
</html>
