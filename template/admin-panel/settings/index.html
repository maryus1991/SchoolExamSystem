 
{% extends "admin-panel/base/base.html" %}

{% block main %}
  
  
  <main class="page-content">

      <div class="page-header">
        <div class="page-header-info">
          <h1>تنظیمات سایت</h1>
          <p>پیکربندی کلی پلتفرم آموزشی</p>
        </div>
        <div class="page-header-actions">
          <button class="btn btn-primary btn-sm" onclick="saveSettings(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
            ذخیره تغییرات
          </button>
        </div>
      </div>

 

      <div class="row g-3">
 
        <form action="" class="row col-md-12 grid" method="post">
          {% csrf_token %}
          {{form.as_ul}}
          {{form.media}}
          <button type="submit" class="btn btn-success btn-lg w-100">ثبت</button>
        </form>

 
      </div>

    </main>
 {% endblock main %}
