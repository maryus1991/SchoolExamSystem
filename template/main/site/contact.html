{% extends "main/base/base.html" %}


{% block content %}


<!-- ============================================================
     PAGE 15: CONTACT
     ============================================================ -->
<div class="page-section  active" id="page-contact">
  <nav class="main-navbar">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between w-100">
        <div class="d-flex align-items-center gap-3">
          <a class="btn p-0" style="color:var(--text-secondary);" href="{% url 'site:main' %}"><i class="bi bi-arrow-right fs-5"></i></a>
          <span class="navbar-brand-text">آزمون‌آنلاین</span>
        </div>
        <div class="theme-toggle" onclick="toggleTheme()"><i class="bi bi-sun-fill sun-icon"></i><i class="bi bi-moon-fill moon-icon"></i></div>
      </div>
    </div>
  </nav>
  <div class="page-header-pattern">
    <div class="container" style="position:relative;z-index:1;">
      <h1 style="color:white;font-weight:900;font-size:2rem;">تماس با ما</h1>
      <p style="color:rgba(255,255,255,0.75);">در خدمت شما هستیم</p>
    </div>
  </div>
  <div class="container py-5">
    <div class="row g-5">
      <div class="col-lg-5">
        <div class="d-flex flex-column gap-4">
          <div class="card-custom">
            <div class="feature-icon fi-blue mb-3"><i class="bi bi-telephone-fill"></i></div>
            <h6 class="fw-700 mb-1">تلفن پشتیبانی</h6>
            <p class="text-secondary mb-0">۰۲۱-۸۸۸۸۱۲۳۴</p>
          </div>
          <div class="card-custom">
            <div class="feature-icon fi-purple mb-3"><i class="bi bi-envelope-fill"></i></div>
            <h6 class="fw-700 mb-1">ایمیل</h6>
            <p class="text-secondary mb-0">support@azmoon-online.ir</p>
          </div>
          <div class="card-custom">
            <div class="feature-icon fi-green mb-3"><i class="bi bi-clock-fill"></i></div>
            <h6 class="fw-700 mb-1">ساعات پشتیبانی</h6>
            <p class="text-secondary mb-0">شنبه تا چهارشنبه | ۸ تا ۱۸</p>
          </div>
        </div>
      </div>
      <div class="col-lg-7">
        <div class="card-custom">
          <h5 class="fw-700 mb-4">ارسال پیام</h5>
          <div class="row g-3 mb-3">
            <div class="col-6"><label class="form-label-custom">نام و نام خانوادگی</label><input type="text" class="form-control-custom" placeholder="نام شما"></div>
            <div class="col-6"><label class="form-label-custom">ایمیل</label><input type="email" class="form-control-custom" placeholder="ایمیل شما"></div>
          </div>
          <div class="mb-3"><label class="form-label-custom">موضوع</label><input type="text" class="form-control-custom" placeholder="موضوع پیام"></div>
          <div class="mb-4"><label class="form-label-custom">متن پیام</label><textarea class="form-control-custom" rows="5" placeholder="پیام خود را بنویسید..." style="resize:vertical;"></textarea></div>
          <button class="btn-primary-gradient btn" onclick="showToast('success','پیام شما با موفقیت ارسال شد')">ارسال پیام <i class="bi bi-send ms-2"></i></button>
        </div>
      </div>
    </div>
  </div>
</div>

 



{% endblock content %}
