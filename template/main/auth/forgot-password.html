{% extends "main/base/base.html" %}


{% block content %}


<!-- ============================================================
     PAGE 4: FORGOT PASSWORD
     ============================================================ -->
<div class="page-section active " id="page-forgot">
  <div class="d-flex align-items-center justify-content-center min-vh-100" style="background:var(--bg-primary);">
    <div style="max-width:420px;width:100%;padding:24px;">
      <div class="text-center mb-5">
        <div style="width:72px;height:72px;background:rgba(245,158,11,0.1);border-radius:var(--radius-xl);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:2rem;">🔑</div>
        <h3 class="fw-800 mb-2">فراموشی رمز عبور</h3>
        <p class="text-secondary" style="font-size:0.9rem;">شماره موبایل یا ایمیل خود را وارد کنید تا لینک بازنشانی برایتان ارسال شود.</p>
      </div>
      <div class="card-custom">
        <div class="mb-4">
          <label class="form-label-custom">شماره موبایل یا ایمیل</label>
          <div class="input-group-custom">
            <i class="bi bi-person input-icon"></i>
            <input type="text" class="form-control-custom" placeholder="09123456789">
          </div>
        </div>
        <button class="btn-primary-gradient btn w-100 btn-lg mb-3" onclick="showPage('otp')">ارسال کد تأیید</button>
        <div class="text-center" style="font-size:0.875rem;color:var(--text-secondary);">
          <a href="#" style="color:var(--primary-600);text-decoration:none;" onclick="showPage('login')">
            <i class="bi bi-arrow-right me-1"></i> بازگشت به ورود
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
