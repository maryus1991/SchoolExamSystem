<!DOCTYPE html>
<html lang="fa" dir="rtl" data-theme="dark" class="w-100">
<head>
  <meta name="enamad" content="36782111" />
    <script>
          (function () {
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      document.documentElement.setAttribute("data-theme", "dark");
    }else{
      document.documentElement.setAttribute("data-theme", "light");

    }
  })();

  function toggleTheme() {
    const currentTheme = document.documentElement.getAttribute("data-theme");

    if (currentTheme === "dark") {
      document.documentElement.removeAttribute("data-theme");
      localStorage.setItem("theme", "light");
    } else {
      document.documentElement.setAttribute("data-theme", "dark");
      localStorage.setItem("theme", "dark");
    }
  }
    </script>
<meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta content="fa" http-equiv="Content-Language">
 
<title>سرنا | پلتفرم هوشمند آزمون و بانک سوال</title>

{% block header %}{% endblock header %}

<body class="w-100">

<div class="messages-container" id="messagesContainer">
    <!-- پیام‌های جنگو اینجا نمایش داده می‌شوند -->
    {% if messages %}
        {% for message in messages %}
            <div class="message-item">
                <div class="col-span-12 row item-center alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show d-flex align-items-center" role="alert" style="gap: 12px;">
                    <button type="button" class="btn-close col-span-2" data-bs-dismiss="alert" aria-label="Close">
                    <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'warning' %}exclamation-triangle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %}"></i>
                    </button>
                    <span class="col-span-10 ">
                        {{ message }}
                    </span>
                </div>
            </div>
        {% endfor %}
    {% endif %}
</div>


    {% block content %}{% endblock content %}


    
    <script src="/static/js/main/bootstrap5.bundle.min.js"></script>
    <script src="/static/js/main/main.js">
    </script>
