<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>آزمون‌آنلاین | پلتفرم هوشمند آزمون و بانک سوال</title>

<!-- Bootstrap 5 RTL -->
<link rel="stylesheet" href="/static/css/bootstrap5.css">
<!-- Bootstrap Icons -->
<!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"> -->

{% block header %}{% endblock header %}

</head>
<body>

<div class="messages-container" id="messagesContainer">
    <!-- پیام‌های جنگو اینجا نمایش داده می‌شوند -->
    {% if messages %}
        {% for message in messages %}
            <div class="message-item">
                <div class="col-span-12 row item-center alert alert-{% if message.tags == 'error' %}danger{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %} alert-dismissible fade show d-flex align-items-center" role="alert" style="gap: 12px;">
                    <button type="button" class="btn-close col-span-2" data-bs-dismiss="alert" aria-label="Close">
                    <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'warning' %}exclamation-triangle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %}"></i>
                    </button>
                    <span class="col-span-10 ">
                        {{ message }}
                    </span>
                </div>
            </div>
        {% endfor %}
    {% endif %}
</div>


    {% block content %}{% endblock content %}

<script src="/static/js/main/main.js">
</script>

{% block footer %}{% endblock footer %}

<script src="/static/js/main/bootstrap5.bundle.min.js"></script>
